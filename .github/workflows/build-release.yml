name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build ModTools/CheatMod/CheatMod.csproj -c Release

      - name: Generate version tag
        id: version
        run: echo "tag=v$(date +'%Y%m%d-%H%M%S')-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "MerryBunnyCheat ${{ steps.version.outputs.tag }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: ModTools/CheatMod/bin/Release/netstandard2.1/MerryBunnyCheat.dll
